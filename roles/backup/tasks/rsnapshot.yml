##### REQUIREMENTS #####

- name: create backups directory
  file:
    path: "{{ rsnapshot_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0770"
  when: rsnapshot_create_root | bool

- name: create rsnapshot log file
  copy:
    force: no
    content: ""
    dest: /var/log/rsnapshot.log
    owner: root
    group: root
    mode: "0660"

##### INSTALLATION/CONFIGURATION #####

- name: install rsnapshot
  apt:
    package: rsnapshot
    state: present

- name: copy rsnapshot configuration
  template:
    src: etc_rsnapshot.conf.j2
    dest: /etc/rsnapshot.conf
    owner: root
    group: root
    mode: "0600"
  notify: check rsnapshot configuration

# DEBT use ansible template module/validate parameter
- name: ensure rsnapshot configuration is valid (flush handlers)
  meta: flush_handlers

- name: create /etc/rsnapshot.d dynamic configuration directory
  file:
    path: /etc/rsnapshot.d
    state: directory
    mode: "0700"

##### SSH KEYS #####

- name: create ssh client configuration directory for root
  file:
    state: directory
    path: /root/.ssh
    owner: root
    group: root
    mode: "0700"
  tags: rsnapshot-ssh-key

- name: create a SSH key pair for root
  openssh_keypair:
    path: /root/.ssh/id_rsa
    mode: "0600"
    size: 4096
  register: backup_root_ssh_key
  tags: rsnapshot-ssh-key
  ignore_errors: "{{ ansible_check_mode }}"

- name: store root public SSH key to local fact file
  tags: rsnapshot-ssh-key
  block:
    - name: create ansible facts.d directory
      file:
        path: /etc/ansible/facts.d
        state: directory
        mode: "0755"
    - name: create rsnapshot fact file
      template:
        src: etc_ansible_facts.d_rsnapshot.fact.j2
        dest: /etc/ansible/facts.d/rsnapshot.fact
        mode: "0644"
      notify: update ansible facts
      ignore_errors: "{{ ansible_check_mode }}" # backup_root_ssh_key.public_key is never set in check mode, always returns empty/changed

# reload ansible local facts
- name: apply configuration (flush handlers)
  meta: flush_handlers
  tags: rsnapshot-ssh-key

- name: create local public_keys directory on the controller
  become: no
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/data/public_keys/"
    state: directory
    mode: "0755"

- name: copy root public SSH key to the controller
  fetch:
    src: /root/.ssh/id_rsa.pub
    dest: "{{ playbook_dir }}/data/public_keys/root@{{ inventory_hostname }}.pub"
    flat: yes
  tags: rsnapshot-ssh-key

- name: display root public SSH key
  debug:
    msg: >
      Please authorize this key on remote machines backup user accounts:
      {{ ansible_local.rsnapshot.ssh.public_key }}
  ignore_errors: "{{ ansible_check_mode }}"
  tags: rsnapshot-ssh-key

##### SCHEDULING #####

- name: install rsnapshot systemd files
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: 'etc_systemd_system_rsnapshot-daily.timer.j2', dest: '/etc/systemd/system/rsnapshot-daily.timer' }
    - { src: 'etc_systemd_system_rsnapshot-weekly.timer.j2', dest: '/etc/systemd/system/rsnapshot-weekly.timer' }
    - { src: 'etc_systemd_system_rsnapshot-monthly.timer.j2', dest: '/etc/systemd/system/rsnapshot-monthly.timer' }
    - { src: 'etc_systemd_system_rsnapshot-daily.service.j2', dest: '/etc/systemd/system/rsnapshot-daily.service' }
    - { src: 'etc_systemd_system_rsnapshot-weekly.service.j2', dest: '/etc/systemd/system/rsnapshot-weekly.service' }
    - { src: 'etc_systemd_system_rsnapshot-monthly.service.j2', dest: '/etc/systemd/system/rsnapshot-monthly.service' }
  notify: reload systemd unit files

- name: apply configuration (flush handlers)
  meta: flush_handlers

- name: start/stop and enable/disable rsnapshot timers
  systemd:
    name: "rsnapshot-{{ item }}"
    state: "{{ 'started' if rsnapshot_enable_service else 'stopped' }}"
    enabled: "{{ rsnapshot_enable_service }}"
  loop:
    - daily.timer
    - weekly.timer
    - monthly.timer
  ignore_errors: "{{ ansible_check_mode }}"

- name: remove rsnapshot cron file
  file:
    path: /etc/cron.d/rsnapshot
    state: absent
